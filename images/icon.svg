<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 主渐变 - 蓝色系 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066FF"/>
      <stop offset="100%" style="stop-color:#0052CC"/>
    </linearGradient>
    <!-- RSS 波纹渐变 -->
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#E0E7FF"/>
    </linearGradient>
    <!-- 阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="40" flood-color="#0066FF" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 圆角矩形背景 -->
  <rect x="128" y="128" width="768" height="768" rx="170" ry="170" fill="url(#bgGradient)" filter="url(#shadow)"/>

  <!-- RSS 信号图标 - 简约现代风格 -->
  <g transform="translate(512, 512)">
    <!-- 中心圆点 -->
    <circle cx="0" cy="80" r="60" fill="url(#waveGradient)"/>

    <!-- 第一圈波纹 -->
    <path d="M -120 80 A 120 120 0 0 1 120 80" stroke="url(#waveGradient)" stroke-width="36" stroke-linecap="round" fill="none" opacity="0.9"/>

    <!-- 第二圈波纹 -->
    <path d="M -200 80 A 200 200 0 0 1 200 80" stroke="url(#waveGradient)" stroke-width="36" stroke-linecap="round" fill="none" opacity="0.7"/>

    <!-- 第三圈波纹 -->
    <path d="M -280 80 A 280 280 0 0 1 280 80" stroke="url(#waveGradient)" stroke-width="36" stroke-linecap="round" fill="none" opacity="0.5"/>
  </g>

  <!-- 装饰性小点 - 增加现代感 -->
  <circle cx="780" cy="244" r="20" fill="white" opacity="0.3"/>
  <circle cx="820" cy="290" r="12" fill="white" opacity="0.2"/>
</svg>